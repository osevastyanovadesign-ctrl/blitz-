<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>БЛИЦ — Мессенджер</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

    <style>
        /* ... все стили из предыдущего кода ... */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #ECE5DD; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 480px; height: 100vh; max-height: 800px; background: white; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #075E54; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; min-height: 56px; }
        .header button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 4px 6px; }
        .back-btn { font-size: 26px !important; }
        .login-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 24px; background: linear-gradient(135deg, #075E54, #128C7E); }
        .login-card { background: white; border-radius: 24px; padding: 32px 28px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-card .logo { text-align: center; font-size: 48px; margin-bottom: 4px; }
        .login-card h2 { text-align: center; color: #075E54; font-size: 26px; margin-bottom: 4px; }
        .login-card .sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 12px 16px; border: 2px solid #ddd; border-radius: 16px; font-size: 15px; margin-bottom: 10px; outline: none; }
        .login-card input:focus { border-color: #25D366; }
        .login-card button { width: 100%; padding: 14px; background: #25D366; color: white; border: none; border-radius: 16px; font-size: 17px; font-weight: bold; cursor: pointer; }
        .login-card button:active { background: #1da85c; }
        .login-card .error { color: #e74c3c; text-align: center; font-size: 13px; margin-bottom: 10px; display: none; }
        .chat-list { flex: 1; overflow-y: auto; padding: 6px 8px; background: #ECE5DD; }
        .chat-item { background: white; border-radius: 12px; padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .chat-item:active { transform: scale(0.98); }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: #25D366; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; flex-shrink: 0; }
        .chat-info { flex: 1; }
        .chat-info .name { font-weight: bold; font-size: 15px; }
        .chat-info .phone { font-size: 12px; color: #888; }
        .chat-info .status { font-size: 11px; color: #25D366; }
        .messages-container { flex: 1; overflow-y: auto; padding: 12px 14px; background: #E5DDD5; display: flex; flex-direction: column; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 12px; margin-bottom: 4px; word-wrap: break-word; font-size: 14px; }
        .message.mine { background: #DCF8C6; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.theirs { background: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message .time { font-size: 9px; color: #999; margin-top: 3px; display: block; text-align: right; }
        .input-area { display: flex; padding: 8px 12px; background: white; gap: 6px; flex-shrink: 0; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 10px 14px; border: 2px solid #ddd; border-radius: 24px; font-size: 15px; outline: none; }
        .input-area input:focus { border-color: #25D366; }
        .input-area button { width: 46px; height: 46px; border-radius: 50%; background: #25D366; color: white; border: none; font-size: 20px; cursor: pointer; flex-shrink: 0; }
        .input-area button:active { background: #1da85c; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; padding: 30px; text-align: center; }
        .empty-state .big { font-size: 48px; margin-bottom: 12px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 12px; font-size: 13px; z-index: 2000; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
        
        /* Уведомления */
        .notification-popup { position: fixed; bottom: -120px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: white; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.25); padding: 12px 16px; z-index: 9999; display: flex; align-items: center; gap: 10px; border-left: 4px solid #25D366; transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
        .notification-popup.show { bottom: 20px; }
        .notification-popup .n-avatar { width: 40px; height: 40px; border-radius: 50%; background: #25D366; color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; flex-shrink: 0; }
        .notification-popup .n-content { flex: 1; min-width: 0; }
        .notification-popup .n-name { font-weight: bold; font-size: 13px; color: #075E54; }
        .notification-popup .n-text { font-size: 12px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .notification-popup .n-time { font-size: 10px; color: #999; flex-shrink: 0; margin-left: 6px; }
        .notification-popup .n-close { background: none; border: none; font-size: 16px; color: #ccc; cursor: pointer; padding: 2px 6px; flex-shrink: 0; }
        .notification-popup .n-close:hover { color: #e74c3c; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .notification-popup.pulse { animation: pulse 0.3s ease; }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // =============================================
        // 🔥 FIREBASE КОНФИГУРАЦИЯ
        // =============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBePRlZIkG9x4qBr01YKuMqR17-GpOT8tU",
            authDomain: "blitz-chat-58958.firebaseapp.com",
            projectId: "blitz-chat-58958",
            storageBucket: "blitz-chat-58958.firebasestorage.app",
            messagingSenderId: "1076631161952",
            appId: "1:1076631161952:web:009313275aa2954b588705"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const messaging = firebase.messaging();

        // =============================================
        // 📦 СОСТОЯНИЕ
        // =============================================
        let currentUserData = null;
        let currentPartnerId = null;
        let currentPartnerName = '';
        let messagesUnsubscribe = null;
        const app = document.getElementById('app');
        let notificationTimeout = null;

        // =============================================
        // 🎨 ВСПЛЫВАЮЩИЕ УВЕДОМЛЕНИЯ
        // =============================================

        function playNotificationSound() {
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 880;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) {}
        }

        function showInAppNotification(senderName, messageText, senderId) {
            const existing = document.getElementById('inAppNotif');
            if (existing) {
                existing.remove();
                clearTimeout(notificationTimeout);
            }

            const popup = document.createElement('div');
            popup.id = 'inAppNotif';
            popup.className = 'notification-popup pulse';
            const initial = (senderName || '?')[0].toUpperCase();
            const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

            popup.innerHTML = `
                        <div class="n-avatar">${initial}</div>
                        <div class="n-content">
                            <div class="n-name">${senderName}</div>
                            <div class="n-text">${messageText || 'Новое сообщение'}</div>
                        </div>
                        <div class="n-time">${time}</div>
                        <button class="n-close" onclick="event.stopPropagation();closeNotification()">✕</button>
                    `;

            popup.addEventListener('click', function(e) {
                if (e.target.closest('.n-close')) return;
                closeNotification();
                if (currentPartnerId !== senderId && senderId) {
                    openChat(senderId, senderName);
                }
            });

            document.body.appendChild(popup);
            setTimeout(() => popup.classList.add('show'), 50);

            playNotificationSound();
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            notificationTimeout = setTimeout(() => {
                closeNotification();
            }, 5000);
        }

        function closeNotification() {
            const popup = document.getElementById('inAppNotif');
            if (popup) {
                popup.classList.remove('show');
                setTimeout(() => popup.remove(), 400);
            }
            clearTimeout(notificationTimeout);
        }

        function showToast(msg) {
            const old = document.querySelector('.toast');
            if (old) old.remove();
            const div = document.createElement('div');
            div.className = 'toast';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // =============================================
        // 📨 PUSH-УВЕДОМЛЕНИЯ
        // =============================================

        async function subscribeToPush() {
            try {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    console.log('❌ Разрешение на уведомления не получено');
                    return;
                }

                const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                console.log('✅ Service Worker зарегистрирован');

                // ВСТАВЬ СВОЙ VAPID-КЛЮЧ ИЗ FIREBASE CONSOLE!
                const token = await messaging.getToken({
                    vapidKey: 'ВАШ_VAPID_КЛЮЧ_ИЗ_FIREBASE'
                });

                console.log('✅ Токен получен:', token);

                const user = auth.currentUser;
                if (user) {
                    await db.collection('users').doc(user.uid).set({
                        fcmToken: token,
                        pushEnabled: true
                    }, { merge: true });
                    console.log('✅ Токен сохранён в Firestore');
                }

                return token;
            } catch (error) {
                console.error('❌ Ошибка подписки на push:', error);
            }
        }

        // =============================================
        // 🔐 ВХОД ПО ТЕЛЕФОНУ (БЕЗ ДУБЛЕЙ!)
        // =============================================

        function renderLogin(errorMsg) {
            app.innerHTML = `
                        <div class="login-container">
                            <div class="login-card">
                                <div class="logo">⚡</div>
                                <h2>БЛИЦ</h2>
                                <div class="sub">Семейный мессенджер</div>
                                <div class="error" id="errorMsg" style="${errorMsg ? 'display:block;' : 'display:none;'}">❌ ${errorMsg || ''}</div>
                                <input type="text" id="phoneInput" placeholder="📱 Телефон" value="+7">
                                <input type="text" id="nameInput" placeholder="👤 Ваше имя">
                                <button onclick="login()">🚀 Войти</button>
                                <div style="text-align:center;margin-top:12px;font-size:11px;color:#bbb;">Без SMS, просто укажи имя</div>
                                <div style="text-align:center;margin-top:4px;font-size:11px;color:#25D366;">🇷🇺 Работает в России</div>
                            </div>
                        </div>
                    `;
        }

        function login() {
            const phone = document.getElementById('phoneInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();

            if (!phone || !name) {
                document.getElementById('errorMsg').textContent = '❌ Введи телефон и имя!';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }

            const btn = document.querySelector('.login-card button');
            btn.textContent = '⏳ Поиск аккаунта...';
            btn.disabled = true;

            // 1️⃣ Ищем пользователя по телефону в Firestore
            db.collection('users')
                .where('phone', '==', phone)
                .get()
                .then(snapshot => {
                    if (!snapshot.empty) {
                        // ✅ Пользователь с таким телефоном УЖЕ ЕСТЬ!
                        const doc = snapshot.docs[0];
                        const existingData = doc.data();
                        const existingUid = doc.id;

                        console.log('👤 Найден существующий пользователь:', existingData.name, existingUid);

                        // 2️⃣ Проверяем, залогинены ли мы уже под этим UID
                        if (auth.currentUser && auth.currentUser.uid === existingUid) {
                            currentUserData = existingData;
                            renderChatList();
                            showToast('👋 С возвращением, ' + existingData.name + '!');
                            btn.textContent = '🚀 Войти';
                            btn.disabled = false;
                            return;
                        }

                        // 3️⃣ Выходим из текущего аккаунта (если есть)
                        const logoutPromise = auth.currentUser ? auth.signOut() : Promise.resolve();

                        logoutPromise
                            .then(() => {
                                return auth.signInAnonymously();
                            })
                            .then(result => {
                                const newUid = result.user.uid;
                                console.log('🆕 Создан новый анонимный UID:', newUid);

                                if (newUid !== existingUid) {
                                    console.log('🔄 Переносим данные из', existingUid, 'в', newUid);
                                    return db.collection('users').doc(newUid).set({
                                        name: existingData.name,
                                        phone: existingData.phone,
                                        uid: newUid,
                                        status: 'В сети',
                                        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                                        createdAt: existingData.createdAt || firebase.firestore.FieldValue
                                            .serverTimestamp()
                                    }, { merge: true })
                                    .then(() => {
                                        return db.collection('users').doc(existingUid).delete();
                                    })
                                    .then(() => {
                                        currentUserData = {
                                            name: existingData.name,
                                            phone: existingData.phone,
                                            uid: newUid
                                        };
                                        renderChatList();
                                        showToast('👋 С возвращением, ' + existingData.name + '!');
                                        btn.textContent = '🚀 Войти';
                                        btn.disabled = false;
                                    });
                                } else {
                                    currentUserData = existingData;
                                    renderChatList();
                                    showToast('👋 С возвращением, ' + existingData.name + '!');
                                    btn.textContent = '🚀 Войти';
                                    btn.disabled = false;
                                }
                            })
                            .catch(err => {
                                showError(err, btn);
                            });
                    } else {
                        // 🆕 Пользователь НОВЫЙ — создаём аккаунт
                        console.log('🆕 Создаём нового пользователя:', name, phone);

                        auth.signInAnonymously()
                            .then(result => {
                                const uid = result.user.uid;
                                return db.collection('users').doc(uid).set({
                                    name: name,
                                    phone: phone,
                                    uid: uid,
                                    status: 'В сети',
                                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                                });
                            })
                            .then(() => {
                                currentUserData = { name, phone, uid: auth.currentUser.uid };
                                renderChatList();
                                showToast('🎉 Добро пожаловать, ' + name + '!');
                                btn.textContent = '🚀 Войти';
                                btn.disabled = false;
                            })
                            .catch(err => {
                                showError(err, btn);
                            });
                    }
                })
                .catch(err => {
                    showError(err, btn);
                });
        }

        function showError(err, btn) {
            console.error('Ошибка:', err);
            document.getElementById('errorMsg').textContent = '❌ ' + err.message;
            document.getElementById('errorMsg').style.display = 'block';
            if (btn) {
                btn.textContent = '🚀 Войти';
                btn.disabled = false;
            }
        }

        function logout() {
            if (messagesUnsubscribe) messagesUnsubscribe();
            auth.signOut().then(() => {
                currentUserData = null;
                currentPartnerId = null;
                renderLogin();
                showToast('👋 Выход выполнен');
            });
        }

        // =============================================
        // 💬 ЧАТЫ
        // =============================================

        function renderChatList() {
            app.innerHTML = `
                        <div class="header">
                            <span style="font-size:18px;font-weight:bold;">⚡ БЛИЦ</span>
                            <span style="font-size:13px;font-weight:normal;">👤 ${currentUserData?.name || ''}</span>
                            <button onclick="logout()" title="Выйти">🚪</button>
                        </div>
                        <div class="chat-list" id="chatList">
                            <div style="text-align:center;padding:30px;color:#999;">Загрузка контактов...</div>
                        </div>
                    `;

            if (auth.currentUser) {
                subscribeToPush();
            }

            loadUsers();
        }

        function loadUsers() {
            const list = document.getElementById('chatList');
            if (!list) return;
            const myUid = auth.currentUser?.uid;
            if (!myUid) return;

            db.collection('users')
                .where('uid', '!=', myUid)
                .onSnapshot(snapshot => {
                    if (!snapshot || snapshot.empty) {
                        list.innerHTML = `
                                    <div class="empty-state">
                                        <div class="big">📡</div>
                                        <h3>Нет пользователей</h3>
                                        <p>Пригласите семью — и вы сможете общаться!</p>
                                    </div>
                                `;
                        return;
                    }
                    let html = '';
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const initial = (data.name || '?')[0].toUpperCase();
                        html += `
                                    <div class="chat-item" onclick="openChat('${doc.id}', '${data.name || 'Без имени'}')">
                                        <div class="avatar">${initial}</div>
                                        <div class="chat-info">
                                            <div class="name">${data.name || 'Без имени'}</div>
                                            <div class="phone">${data.phone || ''}</div>
                                            <div class="status">🟢 ${data.status || 'В сети'}</div>
                                        </div>
                                        <div style="font-size:18px;">💬</div>
                                    </div>
                                `;
                    });
                    list.innerHTML = html;
                });
        }

        function openChat(partnerId, partnerName) {
            currentPartnerId = partnerId;
            currentPartnerName = partnerName;

            app.innerHTML = `
                        <div class="header">
                            <button class="back-btn" onclick="backToChatList()">‹</button>
                            <span style="flex:1;font-size:15px;font-weight:bold;">💬 ${partnerName}</span>
                            <span style="font-size:11px;font-weight:normal;">🟢 онлайн</span>
                        </div>
                        <div class="messages-container" id="messagesContainer">
                            <div style="text-align:center;color:#999;padding:20px;">Загрузка...</div>
                        </div>
                        <div class="input-area">
                            <input type="text" id="messageInput" placeholder="Сообщение..." 
                                   onkeydown="if(event.key==='Enter') sendMessage()">
                            <button onclick="sendMessage()">➤</button>
                        </div>
                    `;

            loadMessages(partnerId);
            setTimeout(() => {
                const inp = document.getElementById('messageInput');
                if (inp) inp.focus();
            }, 300);
        }

        function loadMessages(partnerId) {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            const myUid = auth.currentUser?.uid;
            if (!myUid) return;

            const chatId = myUid < partnerId ? `${myUid}-${partnerId}` : `${partnerId}-${myUid}`;

            if (messagesUnsubscribe) messagesUnsubscribe();

            messagesUnsubscribe = db.collection('chats')
                .doc(chatId)
                .collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot(snapshot => {
                    if (!snapshot || snapshot.empty) {
                        container.innerHTML = `
                                    <div style="text-align:center;color:#999;padding:30px;">
                                        <div style="font-size:40px;">💬</div>
                                        <div>Нет сообщений</div>
                                        <div style="font-size:12px;margin-top:6px;">Напишите что-нибудь!</div>
                                    </div>
                                `;
                        return;
                    }

                    snapshot.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            const msg = change.doc.data();
                            if (msg.senderId !== myUid) {
                                if (currentPartnerId === msg.senderId) return;

                                db.collection('users').doc(msg.senderId).get()
                                    .then(doc => {
                                        if (doc.exists) {
                                            const senderData = doc.data();
                                            const senderName = senderData.name || 'Пользователь';
                                            showInAppNotification(senderName, msg.text, msg.senderId);
                                        }
                                    })
                                    .catch(() => {
                                        showInAppNotification('Пользователь', msg.text, msg.senderId);
                                    });
                            }
                        }
                    });

                    let html = '';
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        const isMine = msg.senderId === myUid;
                        const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', {
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                        html += `
                                    <div class="message ${isMine ? 'mine' : 'theirs'}">
                                        ${msg.text || ''}
                                        <span class="time">${time}</span>
                                    </div>
                                `;
                    });
                    container.innerHTML = html;
                    container.scrollTop = container.scrollHeight;
                });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentPartnerId) return;

            const myUid = auth.currentUser?.uid;
            if (!myUid) return;

            const chatId = myUid < currentPartnerId ?
                `${myUid}-${currentPartnerId}` :
                `${currentPartnerId}-${myUid}`;

            db.collection('chats')
                .doc(chatId)
                .collection('messages')
                .add({
                    text: text,
                    senderId: myUid,
                    timestamp: Date.now()
                })
                .then(() => {
                    db.collection('chats').doc(chatId).set({
                        participants: [myUid, currentPartnerId],
                        lastMessage: text,
                        lastMessageTime: Date.now()
                    }, { merge: true });
                    input.value = '';
                    input.focus();
                });
        }

        function backToChatList() {
            if (messagesUnsubscribe) messagesUnsubscribe();
            currentPartnerId = null;
            renderChatList();
        }

        // =============================================
        // 🔐 АВТОРИЗАЦИЯ
        // =============================================

        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection('users').doc(user.uid).get()
                    .then(doc => {
                        if (doc.exists) {
                            currentUserData = doc.data();
                            if (!currentPartnerId) renderChatList();
                        } else {
                            renderLogin();
                        }
                    })
                    .catch(() => renderLogin());
            } else {
                renderLogin();
            }
        });

        if (auth.currentUser) {
            auth.onAuthStateChanged(() => {});
        } else {
            renderLogin();
        }

        console.log('⚡ БЛИЦ с PUSH-уведомлениями запущен!');
        console.log('📱 Установите приложение на телефон через браузер!');
    </script>

</body>
